syntax = "proto3";

package sentcluster;

service SentenceClustererService {
  rpc ClusterSentences (ClusterRequest) returns (ClusterResponse);
}

message ClusterRequest {
  repeated string sentences = 1;
}

message ClusterResponse {
  repeated ClusteredSentence sentences = 1;
}

message ClusteredSentence {
  string sentence = 1;
  double x = 2;
  double y = 3;
  int32 group = 4;
}

